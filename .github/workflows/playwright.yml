name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    container:
      image: mcr.microsoft.com/playwright:v1.53.1-jammy

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Start app and wait for port 4200
        run: |
          npm start -- --host 0.0.0.0 --port 4200 > app.log 2>&1 &
          # First Angular build can take several minutes in CI containers.
          for i in {1..180}; do
            if curl -fsS http://127.0.0.1:4200 > /dev/null; then
              echo "App is ready on port 4200"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time (6 minutes)"
          cat app.log
          exit 1

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log


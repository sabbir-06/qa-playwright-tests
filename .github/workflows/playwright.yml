name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    container:
      image: mcr.microsoft.com/playwright:v1.53.1-jammy

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular app
        run: |
          export NODE_OPTIONS="--max_old_space_size=4096"
          npx ng build --output-path dist > app.log 2>&1 || { echo "=== BUILD FAILED ==="; cat app.log; exit 1; }
          echo "=== BUILD SUCCEEDED ==="
          ls -lh dist/

      - name: Serve built app on port 4200
        run: |
          npx http-server dist -p 4200 &
          SERVER_PID=$!
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4200 > /dev/null; then
              echo "App is ready on port 4200"
              exit 0
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "http-server process exited unexpectedly"
              exit 1
            fi
            sleep 1
          done
          echo "Static server did not start in time"
          exit 1

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log

